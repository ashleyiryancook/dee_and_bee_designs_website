<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dee & Bee Designs | Custom Handcrafted Handbags</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet" />
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!--
      Hidden form for Netlify Forms detection.
      The React form at /custom-order is rendered at runtime, so Netlify's
      build-time HTML scanner can't see it. This static copy registers the
      form and its field names so submissions are accepted in production.
      Must stay in sync with the form in src/pages/CustomOrder.jsx.
    -->
    <form name="custom-order" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="budget" />
      <input type="text" name="timeline" />
      <textarea name="inspiration"></textarea>
      <input type="text" name="source" />
      <input type="file" name="photo" />
      <input type="text" name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
